name: Web Fuzzing

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        run: chmod +x ./mvnw && ./mvnw -B clean package -DskipTests
      - name: Start app
        run: |
          java -jar target/*.jar &
          sleep 30
      - name: Fuzz /api/courses/search
        run: |
          FAIL=0
          for i in $(seq 1 300); do
            PAYLOAD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9!@#$%^&*()_+-=[]{}|;:,.<>?/~' | head -c $((RANDOM % 200 + 1)))
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://localhost:8080/api/courses/search?title=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$PAYLOAD'''))")" 2>/dev/null || echo "000")
            if [ "${CODE:0:1}" = "5" ]; then
              echo "FAIL #$i: HTTP $CODE with payload length ${#PAYLOAD}"
              FAIL=$((FAIL+1))
            fi
          done
          echo "Fuzz complete: $FAIL server errors out of 300 requests"
          if [ $FAIL -gt 0 ]; then
            echo "::warning::$FAIL server errors detected during fuzzing"
          fi
